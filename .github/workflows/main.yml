name: PlatformIO CI

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
            ~/.platformio/.cache
          key: ${{ runner.os }}-pio
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build PlatformIO Project
        run: pio run
      - name: Rename compiled firmware
        run: mv .pio/build/m5stack-stamps3/firmware.bin ./MessageJarCardputer.bin
      - uses: actions/upload-artifact@v6
        with:
          name: messagejar-firmware
          path: ./MessageJarCardputer.bin
